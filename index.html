<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Апки з найкращим дизайном — референс для Owlymate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0e15; --bg-2:#11131c; --surface:#171a26; --surface-2:#1d2130;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
    --ink:#f2f3f8; --ink-dim:#a6abc0; --ink-faint:#6f7488;
    --emo:#a78bfa; --emo2:#f472b6;
    --health:#34d399; --health2:#22d3ee;
    --prod:#60a5fa; --prod2:#818cf8;
    --util:#8b7cff; --util2:#c4b5fd;
    --creative:#fb7bb5; --creative2:#ffb37a;
    --finance:#a3e635; --finance2:#34d399;
    --access:#fb923c; --access2:#f59e0b;
    --radius:20px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(52,211,153,.06), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:56px 22px 72px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin:0 0 14px}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:clamp(34px,6vw,60px);line-height:1.02;letter-spacing:-.01em;margin:0 0 16px}
  h1 em{font-style:italic;color:var(--emo)}
  .lede{color:var(--ink-dim);max-width:62ch;font-size:clamp(15px,2.2vw,17px);margin:0}
  .meta{margin-top:18px;color:var(--ink-faint);font-size:13.5px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .meta b{color:var(--ink-dim);font-weight:600}
  .filters{display:flex;flex-wrap:wrap;gap:9px;margin:34px 0 30px;position:sticky;top:0;z-index:5;padding:14px 0;background:linear-gradient(var(--bg) 70%, transparent);backdrop-filter:blur(2px)}
  .chip{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink-dim);font:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:999px;cursor:pointer;transition:border-color .18s,color .18s,background .18s;white-space:nowrap}
  .chip:hover{color:var(--ink);border-color:var(--line-strong)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#10121a;border-color:var(--ink);font-weight:600}
  .chip .n{opacity:.55;font-variant-numeric:tabular-nums;margin-left:6px}
  .chip[aria-pressed="true"] .n{opacity:.5}
  .grid{display:grid;gap:16px;margin-top:40px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .card{position:relative;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 20px 20px 22px;transition:transform .2s ease,border-color .2s ease,background .2s ease;min-height:100%}
  .card:hover{transform:translateY(-4px);border-color:var(--line-strong);background:var(--surface-2)}
  .card-top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
  .icon-wrap{width:56px;height:56px;flex:0 0 56px;border-radius:14px;position:relative;box-shadow:0 6px 16px rgba(0,0,0,.35)}
  .icon-wrap img{width:100%;height:100%;object-fit:cover;border-radius:14px;display:block;border:1px solid rgba(255,255,255,.10)}
  .icon-fallback{position:absolute;inset:0;border-radius:14px;display:grid;place-items:center;font-family:"Fraunces",serif;font-weight:600;font-size:21px;color:#0c0d13;box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}
  .name{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0}
  .cat{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-top:4px;color:var(--ink-faint)}
  .note{color:var(--ink-dim);font-size:14px;margin:0 0 18px;flex:1}
  .go{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;text-decoration:none;color:var(--ink);font-size:13.5px;font-weight:600;border:1px solid var(--line-strong);border-radius:10px;padding:9px 13px;transition:background .16s,border-color .16s}
  .go:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.25)}
  .go svg{transition:transform .16s}
  .go:hover svg{transform:translate(2px,-2px)}
  .card::before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:3px;background:linear-gradient(var(--c1),var(--c2));opacity:.85}
  footer{margin-top:46px;padding-top:22px;border-top:1px solid var(--line);color:var(--ink-faint);font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .empty{color:var(--ink-faint);font-size:14px;padding:30px 4px;display:none}
  :focus-visible{outline:2px solid var(--emo);outline-offset:3px;border-radius:6px}
  @media (max-width:560px){.wrap{padding:40px 16px 56px}.grid{grid-template-columns:1fr}.filters{margin:26px 0 22px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.go:hover svg{transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Design reference</p>
    <h1>Апки з <em>найкращим</em><br>дизайном</h1>
    <p class="lede">Список апок-еталонів дизайну, юзабіліті та брендингу — щоб підглянути найкращі рішення для Owlymate. Клік на картці веде в App Store.</p>
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>
  <footer>
    <span>Референс для команди Owlymate</span>
    <span>Іконки вшиті у файл · нічого не підвантажується</span>
  </footer>
</div>

function card(a){
  const c=CATS[a.b];
  const el=document.createElement("article");
  el.className="card";el.dataset.cat=a.b;
  el.style.setProperty("--c1",c.c1);el.style.setProperty("--c2",c.c2);
  el.innerHTML=`
    <div class="card-top">
      <div class="icon-wrap">
        <div class="icon-fallback" style="background:linear-gradient(135deg,${c.c1},${c.c2})">${a.mono}</div>

      </div>
      <div><h2 class="name">${a.n}</h2><div class="cat">${a.cat}</div></div>
    </div>
    <p class="note">${a.note}</p>
    <a class="go" href="${a.url}" target="_blank" rel="noopener">App Store ${arrow}</a>`;
  return el;
}
APPS.forEach(a=>grid.appendChild(card(a)));
